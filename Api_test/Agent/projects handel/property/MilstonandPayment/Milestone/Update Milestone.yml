info:
  name: Update Milestone
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/milestones/update/{{id}}"
  body:
    type: json
    data: |-
      {
        "description": "Updated: Foundation Completion + Approval",
        "percentageDue": 20,
        "constructionStage": "FOUNDATION_COMPLETE"
      }
  auth: inherit

runtime:
  variables:
    - name: id
      value: b504159a-050f-4fb5-bcb2-7ccc89a238e0

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
